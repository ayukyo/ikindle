<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>截图展示 —— iKindle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="iKindle 在 Kindle Paperwhite 4+ 上的实物截图展示。">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://kindle.91api.vip/screenshots.html">
<link rel="stylesheet" href="style.css">

<body>
<article class="static-page">
    <h1>截图展示</h1>
    <p>iKindle 在 Kindle Paperwhite 4（KPW4，2018）实物上的运行截图。下方为占位图，实际部署后由真实截图替换。</p>

    <h2>仪表盘（竖屏）</h2>
    <div class="screenshot-grid">
        <div class="screenshot-item">
            <img src="assets/screenshot-portrait.png" alt="KPW4 仪表盘竖屏截图">
            <div class="caption">KPW4 仪表盘 - 竖屏布局</div>
        </div>
    </div>

    <h2>仪表盘（横屏）</h2>
    <div class="screenshot-grid">
        <div class="screenshot-item">
            <img src="assets/screenshot-landscape.png" alt="KPW4 仪表盘横屏截图">
            <div class="caption">KPW4 仪表盘 - 横屏布局（左右两栏）</div>
        </div>
    </div>

    <h2>夜晚模式（待支持）</h2>
    <p>第一版暂不支持暗色模式（E-InK 黑底白字对比度低，不推荐）。如需要可后续扩展。</p>

    <p><a href="index.html">← 返回首页</a></p>
</article>
