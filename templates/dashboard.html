<!DOCTYPE html>
<html lang="{{HTML_LANG}}">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="1800">
<title>{{TITLE}}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{META_DESC}}">
<meta name="keywords" content="{{META_KW}}">
<meta name="robots" content="index, follow">
<meta name="author" content="iKindle Contributors">

<!-- Open Graph -->
<meta property="og:title" content="{{OG_TITLE}}">
<meta property="og:description" content="{{OG_DESC}}">
<meta property="og:type" content="website">
<meta property="og:url" content="https://kindle.91api.vip/dashboard.html">

<!-- Canonical -->
<link rel="canonical" href="https://kindle.91api.vip/dashboard.html">

<!-- Stylesheet -->
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="offline-banner">{{OFFLINE_BANNER}}</div>

<header>
    <div class="time">{{TIME}}</div>
    <div class="date">{{DATE}}</div>
    <div class="lunar">{{LUNAR}}</div>
</header>

<main>
    <section class="calendar">
        <div class="calendar-header">
            <span>{{CALENDAR_MONTH}}</span>
            <span>{{WEEK_NUMBER}}</span>
        </div>
        <div class="calendar-week">
            <div class="calendar-day">{{WEEKDAY_0}}</div>
            <div class="calendar-day">{{WEEKDAY_1}}</div>
            <div class="calendar-day">{{WEEKDAY_2}}</div>
            <div class="calendar-day">{{WEEKDAY_3}}</div>
            <div class="calendar-day">{{WEEKDAY_4}}</div>
            <div class="calendar-day">{{WEEKDAY_5}}</div>
            <div class="calendar-day">{{WEEKDAY_6}}</div>
        </div>
        <div class="calendar-body">
            {{CALENDAR}}
        </div>
    </section>

    <section class="weather-section">
        <div class="weather" id="weather">{{LOADING}}</div>
        <div class="location" id="location">{{LOCATION}}</div>
        <div class="sunrise-sunset">{{SUNRISE_SUNSET}}</div>
    </section>

    <section class="hitokoto-section">
        <div class="hitokoto" id="hitokoto">{{HITOKOTO}}</div>
    </section>

    <section class="festivals">
        <div class="festival-today">{{FESTIVALS_TODAY}}</div>
        <div class="countdown" id="countdown">{{COUNTDOWN}}</div>
    </section>
</main>

<!-- KINDLE 端 ES5 客户端逻辑 -->
<script src="app.js"></script>
</body>
</html>
