# ============================================================================
# iKindle —— nginx 配置（kindle.91api.vip）
#
# 部署：
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/kindle
#   sudo ln -s /etc/nginx/sites-available/kindle /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 注意：
#   - 80 端口仅用于 HTTPS 重定向 + certbot 验证
#   - 443 端口服务实际内容
#   - /dashboard.html 走 alias 指向 build/dashboard.html（构建期注入）
#   - 静态资源（/style.css / /app.js）长缓存
# ============================================================================

# HTTP server (80) —— 仅重定向到 HTTPS + certbot 验证
server {
    listen 80;
    listen [::]:80;
    server_name kindle.91api.vip;

    # certbot 验证目录
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # 其余全部重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server (443) —— 实际服务
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kindle.91api.vip;

    # SSL 证书（certbot 自动管理）
    ssl_certificate /etc/letsencrypt/live/kindle.91api.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kindle.91api.vip/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 项目根目录（build.sh 输出 dashboard.html 到此）
    root /home/ikindle;
    index index.html;

    # MIME 类型
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 字符集
    charset utf-8;

    # 日志
    access_log /var/log/nginx/ikindle_access.log;
    error_log /var/log/nginx/ikindle_error.log;

    # 安全 headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # 静态文档页 —— 长缓存
    location ~* \.(html|css|js|json|xml|txt|png|jpg|jpeg|gif|svg|ico)$ {
        # dashboard.html 走特殊处理（见下），其他静态资源长缓存
        if ($uri = "/dashboard.html") {
            # 让 dashboard.html 走 no-cache 规则
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # dashboard.html —— 不缓存（每次都拿最新）
    location = /dashboard.html {
        # build.sh 输出到 /home/ikindle/dashboard.html（与 root 一致）
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # 静态资源目录
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # 默认 fallback → index.html
    location / {
        try_files $uri $uri/ =404;
    }

    # robots.txt / sitemap.xml —— 长缓存
    location = /robots.txt {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # 健康检查端点（nginx 自带）
    location = /nginx_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
