name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.6'
          # 兼容旧项目：Python 3.6.8（生产环境版本）
          # 如果想升级，把这里改成 '3.10' 或 '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome (for E-Ink screenshot tests)
        run: |
          # 测试需要 google-chrome 来跑 E-Ink 灰度模拟截图
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run tests
        run: |
          bash tests/run_all.sh

      - name: Upload E-Ink screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eink-screenshots
          path: /tmp/ikindle_grayscale/*.png
          if-no-files-found: ignore
          retention-days: 7